<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vaibhav — Exercise Form Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@300;400;600;700;800&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #080B12;
  --surface: #0E1320;
  --card:    #111827;
  --line:    #1C2333;
  --gym:     #F97316;
  --gym2:    #FB923C;
  --cali:    #22D3EE;
  --cali2:   #67E8F9;
  --cardio:  #4ADE80;
  --gold:    #FBBF24;
  --warn:    #F43F5E;
  --text:    #E2E8F0;
  --muted:   #4B5563;
  --soft:    #94A3B8;
  --r:       10px;
  --r-lg:    16px;
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
  background:var(--bg);
  font-family:'DM Sans', sans-serif;
  color:var(--text);
  overflow-x:hidden;
  min-height:100vh;
}

body::before {
  content:'';
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  opacity:0.35;
}

/* ── HEADER ── */
.header {
  position:relative; z-index:2;
  padding:32px 24px 24px;
  border-bottom:1px solid var(--line);
  background:linear-gradient(180deg, #0C1019 0%, var(--bg) 100%);
}
.header-inner { max-width:860px; margin:0 auto; }
.header-eyebrow {
  font-family:'Space Mono', monospace;
  font-size:10px; letter-spacing:4px; text-transform:uppercase;
  color:var(--muted); margin-bottom:10px;
  display:flex; align-items:center; gap:8px;
}
.header-eyebrow::before {
  content:''; display:inline-block;
  width:24px; height:1px; background:var(--muted);
}
.header-title {
  font-family:'Oxanium', sans-serif;
  font-size:clamp(24px, 5vw, 42px);
  font-weight:800; line-height:1; letter-spacing:-0.5px;
  color:var(--text);
}
.header-title span { color:var(--gym); }
.header-sub {
  font-size:13px; color:var(--soft);
  margin-top:8px; line-height:1.5;
}
.header-count {
  display:inline-flex; align-items:center; gap:6px;
  margin-top:12px;
  font-family:'Space Mono', monospace;
  font-size:11px; color:var(--muted);
}
.header-count strong { color:var(--gold); font-size:14px; }

/* ── SEARCH + FILTERS ── */
.controls {
  position:sticky; top:0; z-index:10;
  background:rgba(8,11,18,0.92);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);
  padding:12px 24px;
}
.controls-inner { max-width:860px; margin:0 auto; display:flex; flex-direction:column; gap:10px; }

.search-wrap {
  position:relative;
}
.search-icon {
  position:absolute; left:14px; top:50%; transform:translateY(-50%);
  color:var(--muted); pointer-events:none; font-size:14px;
}
#search {
  width:100%; background:var(--surface);
  border:1px solid var(--line); border-radius:var(--r);
  color:var(--text); font-family:'DM Sans', sans-serif;
  font-size:14px; padding:10px 14px 10px 40px;
  outline:none; transition:border-color .2s;
}
#search::placeholder { color:var(--muted); }
#search:focus { border-color:rgba(249,115,22,.4); }

.filter-row {
  display:flex; gap:8px; flex-wrap:wrap;
}
.filter-btn {
  font-family:'Space Mono', monospace;
  font-size:10px; letter-spacing:1.5px; text-transform:uppercase;
  padding:5px 12px; border-radius:20px;
  border:1px solid var(--line);
  background:transparent; color:var(--muted);
  cursor:pointer; transition:all .15s; white-space:nowrap;
}
.filter-btn:hover { border-color:var(--soft); color:var(--text); }
.filter-btn.active { color:var(--bg); font-weight:700; }
.filter-btn[data-cat="all"].active    { background:var(--soft);    border-color:var(--soft); }
.filter-btn[data-cat="gym"].active    { background:var(--gym);     border-color:var(--gym); }
.filter-btn[data-cat="cali"].active   { background:var(--cali);    border-color:var(--cali); }
.filter-btn[data-cat="legs"].active   { background:#A78BFA;        border-color:#A78BFA; }
.filter-btn[data-cat="push"].active   { background:var(--gym2);    border-color:var(--gym2); }
.filter-btn[data-cat="pull"].active   { background:var(--cali2);   border-color:var(--cali2); color:#0a1a2a; }
.filter-btn[data-cat="core"].active   { background:var(--cardio);  border-color:var(--cardio); color:#0a1a2a; }
.filter-btn[data-cat="shoulder"].active { background:#F472B6;      border-color:#F472B6; }
.filter-btn[data-cat="arms"].active   { background:var(--gold);    border-color:var(--gold); color:#1a0f00; }

/* ── EXERCISE LIST ── */
.list-wrap { position:relative; z-index:1; max-width:860px; margin:0 auto; padding:20px 24px 60px; }

.result-count {
  font-family:'Space Mono', monospace;
  font-size:10px; letter-spacing:2px; text-transform:uppercase;
  color:var(--muted); margin-bottom:14px;
}
.result-count span { color:var(--gold); }

.no-results {
  text-align:center; padding:60px 20px;
  color:var(--muted); font-size:14px; display:none;
}
.no-results .nr-icon { font-size:32px; margin-bottom:10px; }

/* ── EXERCISE CARD ── */
.ex-card {
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--r-lg);
  margin-bottom:10px;
  overflow:hidden;
  transition:box-shadow .2s;
}
.ex-card:hover { box-shadow:0 4px 24px rgba(0,0,0,.4); }

.ex-card-header {
  display:flex; align-items:center; gap:12px;
  padding:14px 18px;
  cursor:pointer;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
}
.ex-card-header:hover { background:rgba(255,255,255,.02); }

.ex-cat-dot {
  width:8px; height:8px; border-radius:50%; flex-shrink:0;
}
.dot-gym      { background:var(--gym); }
.dot-cali     { background:var(--cali); }

.ex-card-name {
  font-family:'Oxanium', sans-serif;
  font-size:15px; font-weight:700;
  flex:1; line-height:1.2;
}
.ex-card-tags {
  display:flex; gap:5px; flex-wrap:wrap;
}
.ex-tag {
  font-size:9px; font-weight:600; letter-spacing:1px; text-transform:uppercase;
  padding:2px 7px; border-radius:6px;
}
.tag-gym      { background:rgba(249,115,22,.12); color:var(--gym); }
.tag-cali     { background:rgba(34,211,238,.1);  color:var(--cali); }
.tag-legs     { background:rgba(167,139,250,.1); color:#A78BFA; }
.tag-push     { background:rgba(251,146,60,.12); color:var(--gym2); }
.tag-pull     { background:rgba(103,232,249,.1); color:var(--cali2); }
.tag-core     { background:rgba(74,222,128,.1);  color:var(--cardio); }
.tag-shoulder { background:rgba(244,114,182,.1); color:#F472B6; }
.tag-arms     { background:rgba(251,191,36,.1);  color:var(--gold); }
.tag-back     { background:rgba(96,165,250,.1);  color:#60A5FA; }
.tag-chest    { background:rgba(249,115,22,.12); color:var(--gym2); }
.tag-must     { background:rgba(251,191,36,.1);  color:var(--gold); }

.ex-chevron {
  color:var(--muted); font-size:12px;
  transition:transform .2s; flex-shrink:0; margin-left:4px;
}
.ex-card.open .ex-chevron { transform:rotate(180deg); }

/* ── FORM BODY ── */
.ex-form-body {
  display:none;
  border-top:1px solid var(--line);
  padding:0;
}
.ex-card.open .ex-form-body { display:block; }

.form-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:0;
}
@media(max-width:540px){ .form-grid { grid-template-columns:1fr; } }

.form-section {
  padding:16px 18px;
  border-right:1px solid var(--line);
}
.form-section:last-child { border-right:none; }
@media(max-width:540px){
  .form-section { border-right:none; border-bottom:1px solid var(--line); }
  .form-section:last-child { border-bottom:none; }
}

.fs-label {
  font-family:'Space Mono', monospace;
  font-size:9px; letter-spacing:3px; text-transform:uppercase;
  color:var(--muted); margin-bottom:10px;
  display:flex; align-items:center; gap:6px;
}
.fs-label::before {
  content:''; display:inline-block;
  width:16px; height:1px; background:var(--muted);
}

.cue-list { list-style:none; display:flex; flex-direction:column; gap:7px; }
.cue-item {
  display:flex; align-items:flex-start; gap:8px;
  font-size:12.5px; line-height:1.5; color:var(--soft);
}
.cue-num {
  font-family:'Space Mono', monospace;
  font-size:10px; color:var(--muted);
  min-width:16px; padding-top:2px;
}
.cue-item strong { color:var(--text); font-weight:600; }

/* common mistakes */
.mistake-list { list-style:none; display:flex; flex-direction:column; gap:7px; }
.mistake-item {
  display:flex; align-items:flex-start; gap:8px;
  font-size:12px; line-height:1.5; color:var(--soft);
}
.mistake-icon { font-size:11px; flex-shrink:0; padding-top:2px; }

/* breathe + feel bars */
.info-row {
  display:flex; flex-direction:column; gap:8px;
  padding:12px 18px;
  border-top:1px solid var(--line);
  background:rgba(255,255,255,.015);
}
.info-chips { display:flex; gap:8px; flex-wrap:wrap; }
.info-chip {
  display:flex; align-items:center; gap:5px;
  font-size:11px; padding:4px 10px;
  border-radius:8px; border:1px solid;
}
.chip-breathe { background:rgba(34,211,238,.07); border-color:rgba(34,211,238,.2); color:var(--cali); }
.chip-feel    { background:rgba(74,222,128,.07);  border-color:rgba(74,222,128,.2); color:var(--cardio); }
.chip-warning { background:rgba(244,63,94,.07);   border-color:rgba(244,63,94,.2);  color:var(--warn); }
.chip-tip     { background:rgba(251,191,36,.07);  border-color:rgba(251,191,36,.2); color:var(--gold); }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-eyebrow">Vaibhav — Dual Training System</div>
    <h1 class="header-title"><span>Form</span> Guide</h1>
    <p class="header-sub">Correct technique for every exercise in your plan. Tap any exercise to expand.</p>
    <div class="header-count"><strong id="total-count">—</strong> exercises · tap to see form cues</div>
  </div>
</div>

<div class="controls">
  <div class="controls-inner">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search" placeholder="Search exercise…" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
    <div class="filter-row">
      <button class="filter-btn active" data-cat="all">All</button>
      <button class="filter-btn" data-cat="gym">🏋️ Gym</button>
      <button class="filter-btn" data-cat="cali">🤸 Cali</button>
      <button class="filter-btn" data-cat="legs">Legs</button>
      <button class="filter-btn" data-cat="push">Push</button>
      <button class="filter-btn" data-cat="pull">Pull</button>
      <button class="filter-btn" data-cat="core">Core</button>
      <button class="filter-btn" data-cat="shoulder">Shoulder</button>
      <button class="filter-btn" data-cat="arms">Arms</button>
    </div>
  </div>
</div>

<div class="list-wrap">
  <div class="result-count"><span id="result-count">—</span> exercises shown</div>
  <div id="exercise-list"></div>
  <div class="no-results" id="no-results">
    <div class="nr-icon">🔍</div>
    No exercises match your search.
  </div>
</div>

<script>
const EXERCISES = [
  // ── MONDAY GYM ──
  {
    name: "Barbell Back Squat", type:"gym", tags:["gym","legs"],
    cues: [
      "<strong>Bar position:</strong> Rest bar on traps (high bar) or rear delts (low bar), not on neck",
      "<strong>Feet:</strong> Shoulder-width apart, toes pointed out 15–30°",
      "<strong>Brace:</strong> Big breath in, brace core like you're about to be punched, hold through rep",
      "<strong>Descent:</strong> Push knees out over toes, sit back and down — don't let knees cave inward",
      "<strong>Depth:</strong> Aim to get hip crease below knee (parallel or below)",
      "<strong>Drive up:</strong> Push the floor away, keep chest tall, squeeze glutes at top"
    ],
    mistakes: ["Knees caving in (valgus) — actively push knees out", "Heels rising — keep full foot planted", "Forward lean — keep chest up, don't let bar drift forward", "Half reps — go to at least parallel"],
    breathe: "Inhale at top, hold through descent + ascent, exhale at lockout",
    feel: "Quads, glutes, hamstrings — dominant burn in quads",
    tip: "Film a side view. If your hips shoot up before your chest, you need more quad strength."
  },
  {
    name: "Romanian Deadlift", type:"gym", tags:["gym","legs"],
    cues: [
      "<strong>Setup:</strong> Bar in hip crease, slight knee bend, grip just outside thighs",
      "<strong>Hinge:</strong> Push hips BACK (not down), let the bar drag down your thighs",
      "<strong>Back:</strong> Maintain neutral spine throughout — no rounding",
      "<strong>Depth:</strong> Go until hamstring tension stops you, typically shin level",
      "<strong>Drive:</strong> Think 'hips forward' to return — squeeze glutes hard at top"
    ],
    mistakes: ["Bending knees too much (turns it into a squat)", "Letting bar swing away from legs (scrape your shins)", "Rounding the lower back — fatal mistake under load", "Going too deep and losing back position"],
    breathe: "Inhale at top, brace, hinge down, exhale on the way up",
    feel: "Deep hamstring stretch on way down, glute squeeze at lockout",
    tip: "Keep the bar touching your thighs the entire movement — if it swings forward you'll hurt your lower back."
  },
  {
    name: "Leg Press", type:"gym", tags:["gym","legs"],
    cues: [
      "<strong>Foot position:</strong> Mid-platform, shoulder-width; higher = more hamstring/glute, lower = more quad",
      "<strong>Depth:</strong> Lower until knees reach 90° or slightly below — never let lower back peel off seat",
      "<strong>Drive:</strong> Push through full foot, not just toes",
      "<strong>Lockout:</strong> Don't fully lock out knees at top — keep slight tension on quads"
    ],
    mistakes: ["Lower back lifting off pad at bottom — reduce range or weight", "Knees caving inward on push", "Locking knees out completely (joint stress)", "Feet too low = knee strain"],
    breathe: "Inhale as legs lower, exhale as you press up",
    feel: "Quads primarily; foot position changes emphasis",
    tip: "Beginners: use a moderate foot placement and don't chase maximum depth before you've built the strength."
  },
  {
    name: "Leg Curl Machine", type:"gym", tags:["gym","legs"],
    cues: [
      "<strong>Setup:</strong> Pad sits just above ankle, hips flat on bench, no hip lift",
      "<strong>Curl:</strong> Bring heels toward glutes in a controlled arc — full range",
      "<strong>Hold:</strong> Pause 1s at peak contraction",
      "<strong>Return:</strong> Slowly resist on the way back — don't let it snap down"
    ],
    mistakes: ["Hips lifting off bench — reduces hamstring isolation", "Using momentum to swing weight up", "Short range of motion — go all the way up"],
    breathe: "Exhale as you curl up, inhale on return",
    feel: "Strong burn in hamstrings at the peak",
    tip: "Slower negatives (3–4 seconds down) double the muscle stimulus."
  },
  {
    name: "Leg Extension", type:"gym", tags:["gym","legs"],
    cues: [
      "<strong>Setup:</strong> Pad on top of ankles, knees at edge of seat",
      "<strong>Extend:</strong> Kick up to full extension, squeeze quads hard",
      "<strong>Hold:</strong> 1s pause at top",
      "<strong>Return:</strong> Controlled — resist the weight down"
    ],
    mistakes: ["Lifting hips off seat", "Not reaching full extension (loses peak contraction)", "Going too heavy — this is an isolation move, not a strength test"],
    breathe: "Exhale on extension, inhale on return",
    feel: "Burning isolation in the quads",
    warning: "Avoid if you have knee pain. This exercise puts direct shear force on the knee joint."
  },
  {
    name: "Calf Raise", type:"gym", tags:["gym","legs"],
    cues: [
      "<strong>Range:</strong> Full stretch at bottom (heel below platform), full rise at top",
      "<strong>Hold:</strong> 2s pause at peak — squeezing calves tight",
      "<strong>Slow return:</strong> 3 seconds down — calves respond best to slow eccentrics",
      "<strong>Foot angle:</strong> Straight for overall calf; toes out for inner head; toes in for outer"
    ],
    mistakes: ["Bouncing at the bottom (losing stretch benefit)", "Rushing through reps — calves need time under tension", "Not reaching peak height"],
    breathe: "Exhale up, inhale down",
    feel: "Gastrocnemius and soleus deep burn",
    tip: "High reps (15–25) with full range beat heavy partial reps for calf growth."
  },

  // ── MONDAY CALI ──
  {
    name: "Plank Hold", type:"cali", tags:["cali","core"],
    cues: [
      "<strong>Alignment:</strong> Straight line from head to heels — no hips sagging or piking up",
      "<strong>Elbows:</strong> Directly under shoulders",
      "<strong>Brace:</strong> Squeeze abs, glutes, and quads all at once",
      "<strong>Neck:</strong> Neutral — don't crane up or drop chin to chest"
    ],
    mistakes: ["Hips sagging (lower back strain)", "Hips too high (turns into a rest)", "Holding breath instead of breathing through the brace"],
    breathe: "Steady controlled breaths throughout — never hold",
    feel: "Whole core engaged, especially deep abs and obliques",
    tip: "If 30s is easy, elevate feet or add a shoulder tap between each breath."
  },
  {
    name: "Hollow Body Hold", type:"cali", tags:["cali","core"],
    cues: [
      "<strong>Position:</strong> Lie on back, press lower back INTO floor — this is the key",
      "<strong>Arms:</strong> Extend overhead, biceps by ears",
      "<strong>Legs:</strong> Raise to ~45° and squeeze together, toes pointed",
      "<strong>Core:</strong> Think 'compress your ribcage toward your pelvis' — posterior pelvic tilt"
    ],
    mistakes: ["Lower back arching off floor — the whole point is keeping it pressed down", "Holding breath", "Legs too high (makes it easier — lower them as you get stronger)"],
    breathe: "Forced exhale helps — breathe shallow and fast",
    feel: "Deep abs (TVA), entire anterior core",
    tip: "Start with knees bent. Progress to straight legs, then arms overhead. Regression → progression."
  },
  {
    name: "Lying Leg Raises", type:"cali", tags:["cali","core"],
    cues: [
      "<strong>Lower back:</strong> Press it into the floor before you start — maintain this the whole set",
      "<strong>Descent:</strong> Lower legs slowly under control — stop just before lower back lifts",
      "<strong>Rise:</strong> Keep legs straight or slightly bent, squeeze lower abs",
      "<strong>Top:</strong> Don't swing — controlled at all times"
    ],
    mistakes: ["Lower back arching and peeling off floor (herniation risk)", "Using momentum — swinging legs down then up", "Legs apart — keep them together for more resistance"],
    breathe: "Exhale as legs rise, inhale as they lower",
    feel: "Lower abs, hip flexors",
    warning: "If lower back lifts off floor, bend knees to reduce lever arm."
  },
  {
    name: "Bodyweight Squats", type:"cali", tags:["cali","legs"],
    cues: [
      "<strong>Feet:</strong> Shoulder-width, toes slightly out",
      "<strong>Arms:</strong> Extend forward for counterbalance",
      "<strong>Descent:</strong> Sit back and down — weight through full foot",
      "<strong>Depth:</strong> Below parallel, knees tracking over toes",
      "<strong>Ascent:</strong> Drive through heels, squeeze glutes at top"
    ],
    mistakes: ["Knees caving in", "Rising on toes", "Leaning too far forward", "Not reaching depth"],
    breathe: "Inhale down, exhale up",
    feel: "Quads, glutes, hamstrings"
  },
  {
    name: "Reverse Lunges", type:"cali", tags:["cali","legs"],
    cues: [
      "<strong>Step back:</strong> Step far enough that front shin stays vertical",
      "<strong>Drop:</strong> Lower back knee toward floor — don't let it slam down",
      "<strong>Front knee:</strong> Track over second toe, don't cave inward",
      "<strong>Return:</strong> Drive through front heel to return to standing"
    ],
    mistakes: ["Front knee drifting past toes (forward step too short)", "Torso leaning forward excessively", "Knee slamming the floor"],
    breathe: "Inhale on descent, exhale driving back to stand",
    feel: "Front glute and quad, rear hip flexor stretch"
  },
  {
    name: "Wall Sit", type:"cali", tags:["cali","legs"],
    cues: [
      "<strong>Position:</strong> Back flat against wall, thighs parallel to floor (90° at knees)",
      "<strong>Feet:</strong> Shoulder-width, directly under knees — not in front",
      "<strong>Hold:</strong> Don't push hands on thighs for assistance"
    ],
    mistakes: ["Thighs not parallel — too high = too easy", "Feet too far out (knee stress)", "Arms resting on legs for support"],
    breathe: "Slow controlled breathing throughout",
    feel: "Quad endurance burn — isometric hold"
  },
  {
    name: "Glute Bridge", type:"cali", tags:["cali","legs"],
    cues: [
      "<strong>Setup:</strong> Lie on back, feet flat, knees bent ~90°, feet hip-width",
      "<strong>Drive:</strong> Push through heels and upper back — squeeze glutes, not lower back",
      "<strong>Top:</strong> Hips in line with knees and shoulders — no hyperextension of lower back",
      "<strong>Hold:</strong> 1–2s squeeze at the top"
    ],
    mistakes: ["Pushing through toes instead of heels", "Overextending lower back at top (glutes disengage)", "Not squeezing glutes — just using legs"],
    breathe: "Exhale and squeeze on the way up",
    feel: "Glutes primarily; some hamstring"
  },

  // ── TUESDAY GYM ──
  {
    name: "Flat Bench Press", type:"gym", tags:["gym","push","chest"],
    must: true,
    cues: [
      "<strong>Setup:</strong> Eyes under bar, 5 points of contact: head, upper back, glutes, both feet on floor",
      "<strong>Grip:</strong> Slightly wider than shoulder-width; bar in heel of palm, not fingers",
      "<strong>Unrack:</strong> Arms straight, move bar over lower chest before lowering",
      "<strong>Descent:</strong> Tuck elbows ~45–75° (not flared 90°), lower to nipple line",
      "<strong>Drive:</strong> Push bar back up AND slightly back toward rack",
      "<strong>Arch:</strong> Natural arch is fine; excessive bridging takes tension off chest"
    ],
    mistakes: ["Elbows flared 90° (shoulder impingement)", "Bouncing bar off chest", "Feet floating off floor (unstable base)", "Butt lifting off bench"],
    breathe: "Inhale at top, hold on descent, exhale as you press",
    feel: "Chest, front delts, triceps",
    tip: "Think 'spread the bar apart' with your hands — activates chest more."

// ── RENDER ──
function tagHTML(tags) {
  return tags.map(t => `<span class="ex-tag tag-${t}">${t}</span>`).join('');
}

function renderCard(ex, idx) {
  const typeColor = ex.type === 'gym' ? 'dot-gym' : 'dot-cali';
  const mustTag = ex.must ? `<span class="ex-tag tag-must">⭐ must-do</span>` : '';

  const cueItems = ex.cues.map((c,i) =>
    `<li class="cue-item"><span class="cue-num">${String(i+1).padStart(2,'0')}</span><span>${c}</span></li>`
  ).join('');

  const mistakeItems = ex.mistakes.map(m =>
    `<li class="mistake-item"><span class="mistake-icon">✗</span><span>${m}</span></li>`
  ).join('');

  const chips = [
    ex.breathe   ? `<div class="info-chip chip-breathe">🫁 ${ex.breathe}</div>` : '',
    ex.feel      ? `<div class="info-chip chip-feel">💪 ${ex.feel}</div>` : '',
    ex.warning   ? `<div class="info-chip chip-warning">⚠️ ${ex.warning}</div>` : '',
    ex.tip       ? `<div class="info-chip chip-tip">💡 ${ex.tip}</div>` : '',
  ].filter(Boolean).join('');

  return `
<div class="ex-card" data-name="${ex.name.toLowerCase()}" data-type="${ex.type}" data-tags="${ex.tags.join(' ')}" data-idx="${idx}">
  <div class="ex-card-header" onclick="toggleCard(${idx})">
    <span class="ex-cat-dot ${typeColor}"></span>
    <span class="ex-card-name">${ex.name}</span>
    <div class="ex-card-tags">${mustTag}${tagHTML(ex.tags.filter(t=>t!=='gym'&&t!=='cali'))}</div>
    <span class="ex-chevron">▼</span>
  </div>
  <div class="ex-form-body">
    <div class="form-grid">
      <div class="form-section">
        <div class="fs-label">Form Cues</div>
        <ul class="cue-list">${cueItems}</ul>
      </div>
      <div class="form-section">
        <div class="fs-label">Common Mistakes</div>
        <ul class="mistake-list">${mistakeItems}</ul>
      </div>
    </div>
    ${chips ? `<div class="info-row"><div class="info-chips">${chips}</div></div>` : ''}
  </div>
</div>`;
}

const listEl = document.getElementById('exercise-list');
listEl.innerHTML = EXERCISES.map((ex, i) => renderCard(ex, i)).join('');
document.getElementById('total-count').textContent = EXERCISES.length;
document.getElementById('result-count').textContent = EXERCISES.length;

function toggleCard(idx) {
  const card = document.querySelector(`.ex-card[data-idx="${idx}"]`);
  card.classList.toggle('open');
}

// ── FILTER + SEARCH ──
let activeFilter = 'all';

function applyFilters() {
  const query = document.getElementById('search').value.toLowerCase().trim();
  const cards = document.querySelectorAll('.ex-card');
  let visible = 0;

  cards.forEach(card => {
    const name = card.dataset.name;
    const type = card.dataset.type;
    const tags = card.dataset.tags;

    const matchesFilter =
      activeFilter === 'all' ||
      activeFilter === type ||
      tags.includes(activeFilter);

    const matchesSearch = !query || name.includes(query);

    if (matchesFilter && matchesSearch) {
      card.style.display = '';
      visible++;
    } else {
      card.style.display = 'none';
      card.classList.remove('open');
    }
  });

  document.getElementById('result-count').textContent = visible;
  document.getElementById('no-results').style.display = visible === 0 ? 'block' : 'none';
}

document.getElementById('search').addEventListener('input', applyFilters);

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.cat;
    applyFilters();
  });
});
</script>
